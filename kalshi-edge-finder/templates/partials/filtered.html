{% if filtered_markets %}
<div class="card-gradient rounded-xl border border-gray-700/50 overflow-hidden">
    <table class="w-full text-sm">
        <thead>
            <tr class="border-b border-gray-700/50">
                <th class="text-left px-4 py-3 text-gray-400 font-medium text-xs uppercase tracking-wider">Market</th>
                <th class="text-left px-4 py-3 text-gray-400 font-medium text-xs uppercase tracking-wider">Reason</th>
                <th class="text-left px-4 py-3 text-gray-400 font-medium text-xs uppercase tracking-wider">ID</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-800">
            {% for fm in filtered_markets %}
            <tr class="hover:bg-gray-800/30 transition">
                <td class="px-4 py-2 text-gray-300 max-w-md truncate">{{ fm.title }}</td>
                <td class="px-4 py-2">
                    <span class="inline-block px-2 py-0.5 rounded text-xs
                        {% if fm.reason.value == 'political' %}bg-red-900/50 text-red-400
                        {% elif fm.reason.value == 'crypto/asset price' %}bg-orange-900/50 text-orange-400
                        {% elif fm.reason.value == 'geopolitical' %}bg-red-900/50 text-red-300
                        {% elif fm.reason.value == 'corporate decision' %}bg-yellow-900/50 text-yellow-400
                        {% elif fm.reason.value == 'cultural/celebrity' %}bg-pink-900/50 text-pink-400
                        {% elif fm.reason.value == 'no estimable data source' %}bg-gray-700 text-gray-400
                        {% else %}bg-gray-700 text-gray-400{% endif %}">
                        {{ fm.reason.value }}
                    </span>
                </td>
                <td class="px-4 py-2 text-gray-500 font-mono text-xs">{{ fm.market_id }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="text-gray-500 text-sm">No filtered markets to show.</p>
{% endif %}
